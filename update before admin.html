<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title> SkillNest Admin · Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
       <link rel="shortcut icon" href="image/icon.png" type="image/x-icon">
    <link rel="icon" href="image/icon.png" sizes="32*32">
    <link rel="icon" href="image/icon.png" sizes="48*48">
    <link rel="icon" href="image/icon.png" sizes="96*96">
    <link rel="icon" href="image/icon.png" sizes="144*144">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fffefe 0%, #5dffb3 100%);
            padding: 15px 10px;
            position: relative;
        }
        
        /* Mobile-first container */
        .main-container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.342);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgb(35, 255, 152);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 20px 15px;
            transition: all 0.2s ease;
            
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgb(0, 0, 0);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        h1 i {
            background: rgba(15, 224, 144, 0.555);
            padding: 10px;
            border-radius: 50%;
            color: #1e2a3a;
            font-size: 1.2rem;
        }
        
        /* Admin Cards Grid - Mobile Friendly */
        .section-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .admin-card {
            background: rgba(223, 250, 240, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 18px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1.5px solid rgba(255, 255, 255, 0.979);
            color: rgba(8, 8, 8, 0.747);
            font-weight: 600;
            font-size: 0.85rem;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .admin-card i {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }
        
        .admin-card:active {
            background: rgba(5, 243, 172, 0.432);
            transform: scale(0.98);
        }
        
        /* Modal - Mobile Optimized */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            padding: 10px;
            overflow-y: auto;
        }
        
        .modal-content {
            background: rgba(20, 40, 30, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            margin: 10px auto;
            padding: 20px 15px;
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            font-size: 1.2rem;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
            padding: 0 8px;
        }
        
        /* Form Elements - Mobile Friendly */
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #ffffff;
        }
        
        input, select, textarea {
            background: rgba(182, 247, 225, 0.438);
            border: 1.5px solid rgba(255, 255, 255, 0.514);
            border-radius: 16px;
            padding: 12px 16px;
            color: rgb(0, 0, 0);
            font-size: 16px; /* Prevents zoom on iOS */
            outline: none;
            width: 100%;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        input:focus, select:focus, textarea:focus {
            background: rgba(116, 223, 196, 0.25);
            border-color: #00ffaa;
        }
        
        select option {
            background: #1a3a2a;
            color: white;
        }
        
        /* Buttons - Mobile Friendly */
        button {
            background: #00ffaa;
            border: none;
            padding: 14px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            color: #0a2a1a;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            margin-bottom: 10px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .btn-small {
            padding: 5px;
            font-size: 14px;
            width: auto;
            display: inline-block;
        }
        
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        
        .btn-warning {
            background: #ffa502;
            color: white;
        }
        
        .btn-success {
            background: #2ed573;
            color: white;
        }
        
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .flex-row button {
            flex: 1;
            min-width: 120px;
        }
        
        /* Grade Chips - Scrollable */
        .grade-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .grade-chip {
            background: rgba(0, 255, 157, 0.829);
            padding: 12px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            flex: 0 0 auto;
        }
        
        .grade-chip:active {
            background: #00ffaa;
            color: #0a2a1a;
        }
        
        /* Tables - Scrollable on Mobile */
        .table-wrapper {
            overflow-x: auto;
            margin: 15px 0;
            border-radius: 16px;
        }
        
        .student-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 400px;
        }
        
        .student-table th {
            background: rgba(0, 255, 157, 0.2);
            padding: 12px 8px;
            text-align: left;
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .student-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: #eee;
        }
        
        /* Attendance Buttons */
        .attendance-btns {
            display: flex;
            gap: 5px;
        }
        
        .present-btn, .absent-btn {
            padding: 8px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        
        .present-btn {
            background: #2ed573;
            color: white;
        }
        
        .absent-btn {
            background: #ff4757;
            color: white;
        }
        
        /* Payment Month Grid */
        .payment-month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        
        .month-option {
            background: rgba(255, 255, 255, 0.15);
            padding: 14px 5px;
            text-align: center;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .month-option.paid {
            background: #2ed573;
            opacity: 0.7;
        }
        
        .month-option.selected {
            background: #00ffaa;
            color: #0a2a1a;
            border: 2px solid white;
        }
        
        /* Mark Input for Exam */
        .mark-input {
            width: 70px;
            padding: 8px;
            font-size: 14px;
        }
        
        /* Skill Inputs */
        .skill-input {
            width: 70px;
            padding: 8px;
            font-size: 13px;
        }
        
        /* Login Panel Specific */
        .login-container {
            max-width: 400px;
            margin: 30px auto;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .login-header i {
            font-size: 3.5rem;
            color: #07ffb5;
            background: rgba(255, 255, 255, 0.404);
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        
        .login-header h2 {
            color: rgba(6, 255, 172, 0.568);
            font-size: 1.8rem;
        }
        
        /* Pending Badge */
        .pending-badge {
            background: #ffa502;
            color: white;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 14px;
            font-weight: 600;
        }
        
        /* Filter Result */
        .filter-result {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 16px;
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        .filter-result pre {
            color: #00ffaa;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a3a2a;
            color: white;
            padding: 14px 20px;
            border-radius: 30px;
            z-index: 2100;
            backdrop-filter: blur(10px);
            text-align: center;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Loader */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #00ffaa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Back Link */
        .back-link {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 100;
        }
        
        .back-link a {
            color: white;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 16px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Area containers */
        #attendanceArea, #examArea, #skillArea, #paymentArea {
            margin-top: 15px;
        }
        
        /* Save button in modal */
        .save-btn {
            margin-top: 15px;
            position: sticky;
            bottom: 0;
            background: #00ffaa;
        }
        
        /* Two column form grid */
        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        
        /* Desktop adjustments */
        @media (min-width: 768px) {
            body {
                padding: 30px 20px;
            }
            
            .main-container {
                max-width: 1400px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .section-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
            
            .admin-card {
                padding: 25px 15px;
                font-size: 1rem;
            }
            
            .admin-card i {
                font-size: 2.5rem;
            }
            
            .admin-card:hover {
                background: rgba(5, 243, 172, 0.8);
                transform: translateY(-5px);
            }
            
            .modal-content {
                max-width: 700px;
                padding: 25px;
            }
            
            .form-grid-2 {
                grid-template-columns: 1fr 1fr;
            }
            
            .payment-month-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            button {
                width: auto;
            }
        }
        
        /* For very small phones */
        @media (max-width: 360px) {
            .section-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .admin-card {
                padding: 12px 5px;
                font-size: 0.75rem;
            }
            
            .admin-card i {
                font-size: 1.5rem;
            }
        }
        /* Dark Mode Styles */
body.dark-mode {

}

}

.theme-toggle {
    position: fixed;

        #adminLoginPanel .glass-panel {

        #adminLoginPanel .fa-lock {

        @keyframes pulse {

        }
        
        @keyframes shake {

            75% { transform: translateX(8px); }
        }

    </style>
</head>

<script>
    // ==================== CONFIGURATION ====================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8rZB8_rO2YNB6wXon6Mcb55iN-XxowGiNFv4Pej5pul5xyXEssySql4-wbsu3aSNs/exec";
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    // ==================== HELPER FUNCTIONS ====================
    function showLoader(show) {
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
    
    // Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');

const savedTheme = localStorage.getItem('skillnest_theme');
if (savedTheme === 'dark') {
    document.body.classList.add('dark-mode');
    themeIcon.className = 'fas fa-sun';
}

if (themeToggle) {
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('skillnest_theme', isDark ? 'dark' : 'light');
    });
}
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#ff4757' : '#2ed573';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function apiCall(action, method = 'GET', payload = {}) {
        try {
            let url = new URL(SCRIPT_URL);
            if (method === 'GET') {
                url.searchParams.append('action', action);
                Object.entries(payload).forEach(([k, v]) => {
                    if (v !== undefined && v !== null) url.searchParams.append(k, v);
                });
                let r = await fetch(url);
                return await r.json();
            } else {
                let f = new URLSearchParams();
                f.append('action', action);
                f.append('data', JSON.stringify(payload));
                let r = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: f
                });
                return await r.json();
            }
        } catch (e) {
            return { error: true, message: e.message };
        }
    }

async function loadDashboardStats() {

            document.getElementById('totalStudents').textContent = students.data.length;
        }
        
        const payments = await apiCall('getAllPayments', 'GET');
        const today = new Date();
        const currentMonth = today.getMonth() + 1;
        const currentYear = today.getFullYear();
        
        console.log('=== MONTHLY INCOME DEBUG ===');
        console.log('Current Month:', currentMonth, 'Year:', currentYear);
        
        let monthlyTotal = 0;
        const monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                            'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const currentMonthName = monthNames[currentMonth];
        
        if (payments.success && payments.data) {
            console.log('Total payments:', payments.data.length);
            
            payments.data.forEach(p => {
                let paymentMonth = null;
                let paymentYear = null;
                
                // Method 1: Try paymentDate
                if (p.paymentDate) {
                    const parts = String(p.paymentDate).split('T')[0].split('-');
                    paymentMonth = Number(parts[1]);
                    paymentYear = Number(parts[0]);
                }
                
                // ✅ Method 2: Extract from timestamp (HTML FIX)
                if (!paymentMonth && p.timestamp) {
                    const tsParts = String(p.timestamp).split('T')[0].split('-');
                    paymentMonth = Number(tsParts[1]);
                    paymentYear = Number(tsParts[0]);
                }
                
                // Method 3: Fallback to original month
                if (!paymentMonth && p.month && p.year) {
                    paymentMonth = monthNames.indexOf(String(p.month));
                    paymentYear = Number(p.year);
                }
                
                // Count if payment month matches current month
                if (paymentMonth === currentMonth && paymentYear === currentYear) {
                    monthlyTotal += 1000;
                    console.log(`✅ COUNTED: ${p.id} | Original: ${p.month} | Paid: ${paymentMonth}/${paymentYear}`);
                }
            });
        }
        
        console.log('FINAL Monthly Total: Rs.' + monthlyTotal);
        document.getElementById('monthlyIncome').textContent = 'Rs.' + monthlyTotal.toLocaleString();
        
        // Pending Payments
        let pendingCount = 0;
        if (students.success) {
            students.data.forEach(s => {

                        p.month && String(p.month).toLowerCase() === currentMonthName.toLowerCase() && 
                        Number(p.year) === currentYear) : false;

function displayViewerResults(data, sheetName) {
    if (!data || data.length === 0) {
        document.getElementById('viewerResults').innerHTML = '<p style="color: #f39c12; text-align: center;">No records found.</p>';
        return;
    }
    
    const headers = Object.keys(data[0]);
    
    // ✅ ADD ONE DAY to all date fields to fix timezone shift
    const processedData = data.map(row => {
        const newRow = {};
        headers.forEach(h => {
            let value = row[h];
            
            // Check if this is a date field
            if (value && (h === 'Date' || h === 'Birth' || h.toLowerCase().includes('date') || h.toLowerCase().includes('birth'))) {
                try {
                    let dateStr = '';
                    if (value instanceof Date) {
                        const year = value.getUTCFullYear();
                        const month = String(value.getUTCMonth() + 1).padStart(2, '0');
                        const day = String(value.getUTCDate()).padStart(2, '0');
                        dateStr = `${year}-${month}-${day}`;
                    } else if (typeof value === 'string') {
                        dateStr = value.split('T')[0];
                    } else {
                        dateStr = String(value);
                    }
                    
                    if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
                        const parts = dateStr.split('-');
                        const originalDate = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
                        originalDate.setUTCDate(originalDate.getUTCDate() + 1);
                        
                        const year = originalDate.getUTCFullYear();
                        const month = String(originalDate.getUTCMonth() + 1).padStart(2, '0');
                        const day = String(originalDate.getUTCDate()).padStart(2, '0');
                        newRow[h] = `${year}-${month}-${day}`;
                    } else {
                        newRow[h] = dateStr;
                    }
                } catch (e) {
                    newRow[h] = value;
                }
            } 
            // ✅ Handle ProfileImage - show thumbnail
            else if (h === 'ProfileImage' && value && value.startsWith('data:image')) {
                newRow[h] = `<img src="${value}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">`;
            }
            // ✅ Handle Email - make clickable
            else if (h === 'Email' && value) {
                newRow[h] = `<a href="mailto:${value}" style="color:#00ffaa;">${value}</a>`;
            }
            else {
                newRow[h] = value !== undefined && value !== null ? value : '-';
            }
        });
        return newRow;
    });
    
    let tableHtml = `
        <div style="background: rgba(0,255,157,0.15); padding: 12px; border-radius: 12px; margin-bottom: 15px;">
            <strong>📊 ${processedData.length} record(s) found in ${sheetName}</strong>
        </div>
        <div style="overflow-x: auto; max-height: 350px;">
            <table class="student-table" style="font-size: 0.85rem; width: 100%;">
                <thead>
                    <tr>${headers.map(h => `<th style="position: sticky; top: 0; background: #2a4a3a;">${h}</th>`).join('')}</tr>
                </thead>
                <tbody>
                    ${processedData.map(row => `
                        <tr>
                            ${headers.map(h => `<td>${row[h]}</td>`).join('')}
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
    
    document.getElementById('viewerResults').innerHTML = tableHtml;
}

function exportViewerToCSV(data, sheetName, grade) {
    if (!data || data.length === 0) return;
    
    const headers = Object.keys(data[0]);
    const csvRows = [];
    
    // Remove ProfileImage from headers for CSV (too long)
    const exportHeaders = headers.filter(h => h !== 'ProfileImage');
    csvRows.push(exportHeaders.join(','));
    
    data.forEach(row => {
        const values = exportHeaders.map(h => {
            let val = row[h];
            
            // Add one day to date fields
            if (val && (h === 'Date' || h === 'Birth' || h.toLowerCase().includes('date') || h.toLowerCase().includes('birth'))) {
                try {
                    let dateStr = '';
                    if (val instanceof Date) {
                        const year = val.getUTCFullYear();
                        const month = String(val.getUTCMonth() + 1).padStart(2, '0');
                        const day = String(val.getUTCDate()).padStart(2, '0');
                        dateStr = `${year}-${month}-${day}`;
                    } else if (typeof val === 'string') {
                        dateStr = val.split('T')[0];
                    } else {
                        dateStr = String(val);
                    }
                    
                    if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
                        const parts = dateStr.split('-');
                        const originalDate = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
                        originalDate.setUTCDate(originalDate.getUTCDate() + 1);
                        
                        const year = originalDate.getUTCFullYear();
                        const month = String(originalDate.getUTCMonth() + 1).padStart(2, '0');
                        const day = String(originalDate.getUTCDate()).padStart(2, '0');
                        val = `${year}-${month}-${day}`;
                    }
                } catch (e) {}
            }
            
            if (val === null || val === undefined) return '';
            const strVal = String(val);
            if (strVal.includes(',') || strVal.includes('"') || strVal.includes('\n')) {
                return '"' + strVal.replace(/"/g, '""') + '"';
            }
            return strVal;
        });
        csvRows.push(values.join(','));
    });
    
    const csvString = csvRows.join('\n');
    const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    
    const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    link.setAttribute('href', url);
    link.setAttribute('download', `${sheetName}_Grade${grade}_${timestamp}.csv`);
    link.style.display = 'none';
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    
    showToast(`✅ Exported ${data.length} records to CSV! (Images excluded)`);
}

        let html = `
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-clock"></i> Pending Approvals</h2>
                    <button class="close-modal" onclick="closeModal()">&times;</button>
                </div>
                <div class="table-wrapper">
                    <table class="student-table">
                        <tr><th>ID</th><th>Name</th><th>Grade</th><th>Phone</th><th>Action</th></tr>
                        ${rows}
                    </table>
                </div>
            </div>
        `;
        
        openModal(html);
        
        document.querySelectorAll('.approve-btn').forEach(btn => {
            btn.addEventListener('click', async function() {
                let id = this.dataset.id;
                showLoader(true);
                let r = await apiCall('approveRegistration', 'POST', { id });
                showLoader(false);
                
                if (r.success) {
                    showToast(`Approved! New ID: ${r.permanentId}`);
                    closeModal();
                    loadPendingCount();
                } else {
                    showToast(r.message, true);
                }
            });
        });
        
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.addEventListener('click', async function() {
                let id = this.dataset.id;
                showLoader(true);
                await apiCall('rejectRegistration', 'POST', { id });
                showLoader(false);
                showToast('Registration rejected');
                closeModal();
                loadPendingCount();
            });
        });
    }
    
    console.log('✅ Admin Panel Ready - Mobile Responsive');
</script>

</body>
</html>
